<html>

<head>
  <title>
    Simple translator/encoder
  </title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="https://j33569.github.io/1/main/favicon.svg">
</head>

<body>
  <h1>A simple encoder</h1>
  <p class="key">Key</p>
  <div class="buttons">
    <button onclick="copyDecoded()">Copy text</button>
    <button class="temporary" onclick="encode()">Encode</button>
    <input type="text" id="key" pattern="[0-9]{1}" maxlength="1" placeholder="Key">
    <button class="temporary" onclick="decode()">Decode</button>
    <button onclick="copyEncoded()">Copy code</button>
  </div>
  <div>
    <textarea type="text" placeholder="Put text to encode here" id="ta1"></textarea>
    <textarea type="text" placeholder="Put text to decode here" id="ta2"></textarea>
  </div>
  <p class="warning">WARNING, PUTTING COMMA SPACE(, ) DOES NOT WORK, AND IS CURRENTLY BEING FIXED<br>WARNING, KEY DOES
    NOT WORK AND MAY BREAK AND IS CURRENTLY BEING FIXED</p>
  <script src="script.js"></script>
</body>

</html>
